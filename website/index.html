<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dara DULON — Software Engineer. Terminal portfolio." />
    <title>Dara DULON</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script>
      (function () {
        const t = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>

    <svg class="botanical" viewBox="0 0 320 420" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Main stem -->
      <path d="M160 400 C155 335 148 270 158 205 C163 175 160 145 155 105" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Left branch 1 -->
      <path d="M156 300 C130 285 108 270 88 248" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Left leaf 1 -->
      <path d="M88 248 C70 234 58 214 68 200 C78 186 102 192 112 210 C122 228 112 244 88 248Z" stroke-width="1.5"/>
      <!-- Right branch 1 -->
      <path d="M160 268 C183 256 202 244 220 226" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Right leaf 1 -->
      <path d="M220 226 C238 214 252 196 244 180 C236 164 212 170 205 188 C198 206 206 220 220 226Z" stroke-width="1.5"/>
      <!-- Left branch 2 -->
      <path d="M157 218 C135 206 116 192 98 174" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Left leaf 2 -->
      <path d="M98 174 C80 158 70 136 82 122 C94 108 118 116 122 136 C126 156 116 170 98 174Z" stroke-width="1.5"/>
      <!-- Right branch 2 -->
      <path d="M159 190 C180 178 196 164 210 148" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Right leaf 2 -->
      <path d="M210 148 C226 132 236 112 226 98 C216 84 194 92 192 112 C190 132 198 144 210 148Z" stroke-width="1.5"/>
      <!-- Top bloom -->
      <path d="M155 97 C148 82 148 64 156 56 C164 48 172 56 170 68 C168 80 158 88 155 97Z" stroke-width="1.5"/>
      <path d="M155 97 C148 80 136 68 130 72 C124 76 128 92 138 98 C148 104 155 97 155 97Z" stroke-width="1.5"/>
      <path d="M155 97 C162 80 174 68 180 72 C186 76 182 92 172 98 C162 104 155 97 155 97Z" stroke-width="1.5"/>
      <circle cx="155" cy="97" r="5" stroke-width="1.5"/>
      <!-- Berries -->
      <circle cx="90" cy="246" r="4.5" stroke-width="1.5"/>
      <circle cx="220" cy="224" r="4.5" stroke-width="1.5"/>
      <circle cx="100" cy="172" r="4" stroke-width="1.5"/>
      <circle cx="210" cy="146" r="4" stroke-width="1.5"/>
      <!-- Stem dots -->
      <circle cx="162" cy="322" r="2.5"/>
      <circle cx="159" cy="255" r="2"/>
      <circle cx="158" cy="200" r="2"/>
    </svg>

    <header>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="4" stroke-width="2" stroke-linecap="round"/>
          <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </header>

    <main>
      <section class="hero">
        <p class="eyebrow" id="eyebrow">Software Engineer</p>
        <h1 id="name">Dara <span class="name-accent">DULON</span></h1>
        <p class="tagline" id="tagline">
          Web · Cloud · Open Source
          <span class="tagline-sub">Paris, France</span>
        </p>

        <div class="commands" id="commands">
          <div class="command-card" id="cmd-npx" data-cmd="npx baretsky">
            <span class="cmd-label">Run anywhere</span>
            <div class="cmd-row">
              <code>npx baretsky</code>
              <button class="copy-btn" aria-label="Copy npx command">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="9" y="9" width="13" height="13" rx="2" stroke-width="2"/>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span class="copy-text">Copy</span>
              </button>
            </div>
          </div>

          <div class="cmd-divider"><span>or</span></div>

          <div class="command-card" id="cmd-ssh" data-cmd="ssh portfolio@portfolio.baretsky.net">
            <span class="cmd-label">SSH direct</span>
            <div class="cmd-row">
              <code>ssh portfolio@portfolio.baretsky.net</code>
              <button class="copy-btn" aria-label="Copy SSH command">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="9" y="9" width="13" height="13" rx="2" stroke-width="2"/>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span class="copy-text">Copy</span>
              </button>
            </div>
          </div>
        </div>

        <button class="terminal-btn" id="terminalBtn">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="4" width="20" height="16" rx="2" stroke-width="2"/>
            <path d="M7 9l3 3-3 3M13 15h4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Open in browser
        </button>
      </section>
    </main>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="modal">
        <div class="modal-header">
          <div class="modal-dots">
            <span class="dot dot-red"></span>
            <span class="dot dot-yellow"></span>
            <span class="dot dot-green"></span>
          </div>
          <span class="modal-title">baretsky — portfolio</span>
          <button class="modal-close" id="modalClose" aria-label="Close terminal">✕</button>
        </div>
        <div class="terminal-container" id="terminalContainer">
          <div class="mobile-message" id="mobileMessage">
            <p>Open on desktop to use the live terminal.</p>
            <p class="mobile-sub">Or run <code>npx baretsky</code> in your own terminal.</p>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
